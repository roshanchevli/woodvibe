<!-- Hero -->
<section class="product-hero">
  <div class="hero-content text-center">
    <h1 data-aos="fade-up">Curated Collections</h1>
    <p data-aos="fade-up" data-aos-delay="200">
      Timeless designs, handcrafted for the modern home.
    </p>
  </div>
</section>

<!-- Product Section -->
<section class="product-section" id="product-list">
  <div class="container">
    <div class="spotlight-tag" data-aos="fade-up">Handpicked For You</div>
    <h2 class="section-title" data-aos="fade-up">Discover Our Pieces</h2>

    <div class="filter-container" data-aos="fade-up">
      <div class="filters">
        <button class="filter-btn" [class.active]="selectedCategory === 'All'" (click)="filterProducts('All')">
          All Collection
        </button>
        <button *ngFor="let cat of categories" class="filter-btn" [class.active]="selectedCategory === cat.categoryName"
          (click)="filterProducts(cat.categoryName)">
          {{ cat.categoryName }}
        </button>
      </div>

      <div class="search-box-wrapper">
        <i class="ri-search-line search-icon"></i>
        <input type="text" class="search-box" placeholder="Search our catalog..." (input)="onSearch($event)" />
      </div>
    </div>

    <!-- Products -->
    <div class="product-grid">
      <!-- Empty State -->
      <div *ngIf="filteredProducts.length === 0" class="empty-state" data-aos="zoom-in">
        <i class="ri-archive-line"></i>
        <h3>Sculpting New Pieces...</h3>
        <p class="text-muted">
          No products found matching your criteria. Try adjusting your filters.
        </p>
      </div>

      <!-- Product Card -->
      <div class="product-card" *ngFor="let p of filteredProducts; let i = index" [attr.data-aos]="'fade-up'"
        [attr.data-aos-delay]="(i % 4) * 100">
        <div class="product-badge" *ngIf="i % 5 === 0">New Arrival</div>

        <div class="image-container">
          <!-- Primary Image -->
          <img [src]="p.photo ? 'http://localhost:3000/uploads/' + p.photo : '/images/placeholder.png'"
            alt="{{ p.pname }}" class="primary-img" />
          
          <!-- Secondary Image for Hover (if available) -->
          <img *ngIf="p.photos && p.photos.length > 1"
            [src]="'http://localhost:3000/uploads/' + p.photos[1]"
            alt="{{ p.pname }}" class="hover-img" />
        </div>

        <div class="product-info">
          <span class="category-tag">{{ p.category || 'Furniture' }}</span>
          <h4>{{ p.pname }}</h4>
          <div class="price-tag">
            <span>₹{{ p.price | number }}</span>
          </div>
          <button class="btn-details" (click)="viewDetails(p._id)">View Details</button>
        </div>
      </div>
    </div>
  </div>
</section>
