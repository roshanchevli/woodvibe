<div class="edit-profile-page">
  <div class="container py-5">
    
    <!-- BACK BUTTON -->
    <a (click)="router.navigate(['/profile'])" class="back-link" style="cursor: pointer;">
      <i class="ri-arrow-left-line"></i> Back to Profile
    </a>

    <div class="row justify-content-center mt-4">
      <div class="col-lg-6 col-md-8">
        
        <!-- CARD -->
        <div class="edit-card">
          <div class="card-header text-center">
            <h2 class="form-title">Edit Profile</h2>
            <p class="text-muted">Update your personal information</p>
          </div>

          <div class="card-body p-4 p-md-5">
            <form (ngSubmit)="saveChanges()" #profileForm="ngForm">
              
              <!-- First Name -->
              <div class="form-group mb-4">
                <label class="form-label">First Name</label>
                <div class="input-wrapper">
                  <i class="ri-user-smile-line field-icon"></i>
                  <input type="text" name="fname" class="form-field" [(ngModel)]="user.fname" required placeholder="Enter first name">
                </div>
              </div>

              <!-- Last Name -->
              <div class="form-group mb-4">
                <label class="form-label">Last Name</label>
                <div class="input-wrapper">
                  <i class="ri-user-line field-icon"></i>
                  <input type="text" name="lname" class="form-field" [(ngModel)]="user.lname" required placeholder="Enter last name">
                </div>
              </div>

              <!-- Email (Read-only) -->
              <div class="form-group mb-4">
                <label class="form-label">Email Address</label>
                <div class="input-wrapper disabled">
                  <i class="ri-mail-line field-icon"></i>
                  <input type="email" name="email" class="form-field" [value]="user.email" disabled>
                </div>
                <p class="info-text"><i class="ri-information-line"></i> Email cannot be changed.</p>
              </div>

              <!-- Contact -->
              <div class="form-group mb-5">
                <label class="form-label">Contact Number</label>
                <div class="input-wrapper">
                  <i class="ri-phone-line field-icon"></i>
                  <input type="text" name="contact" class="form-field" [(ngModel)]="user.contact" required placeholder="Enter contact number">
                </div>
              </div>

              <!-- SAVE BUTTON -->
              <button type="submit" class="save-btn" [disabled]="profileForm.invalid">
                Save Changes <i class="ri-check-line ms-2"></i>
              </button>

            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
