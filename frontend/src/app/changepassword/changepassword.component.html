<div class="change-password-page">
  <div class="container py-5">

    <!-- BACK BUTTON -->
    <a (click)="router.navigate(['/profile'])" class="back-link" style="cursor: pointer;">
      <i class="ri-arrow-left-line"></i> Back to Profile
    </a>

    <div class="row justify-content-center mt-4">
      <div class="col-lg-5 col-md-7">

        <!-- CARD -->
        <div class="password-card">

          <!-- HEADER ICON -->
          <div class="card-icon-header">
            <div class="icon-circle">
              <i class="ri-lock-password-line"></i>
            </div>
            <h2 class="form-title">Change Password</h2>
            <p class="subtitle">Keep your account secure</p>
          </div>

          <div class="card-body p-4 p-md-5 pt-md-4">
            <form (ngSubmit)="updatePassword()" #passwordForm="ngForm">

              <!-- Old Password -->
              <div class="form-group mb-4">
                <label class="form-label">Old Password</label>
                <div class="input-wrapper">
                  <i class="ri-lock-line field-icon"></i>
                  <input
                    [type]="showOldPassword ? 'text' : 'password'"
                    name="oldPassword"
                    class="form-field"
                    [(ngModel)]="oldPassword"
                    required
                    placeholder="Enter old password"
                  >
                  <i
                    class="toggle-eye"
                    [class.ri-eye-line]="showOldPassword"
                    [class.ri-eye-off-line]="!showOldPassword"
                    (click)="showOldPassword = !showOldPassword"
                  ></i>
                </div>
              </div>

              <!-- New Password -->
              <div class="form-group mb-4">
                <label class="form-label">New Password</label>
                <div class="input-wrapper">
                  <i class="ri-lock-2-line field-icon"></i>
                  <input
                    [type]="showNewPassword ? 'text' : 'password'"
                    name="newPassword"
                    class="form-field"
                    [(ngModel)]="newPassword"
                    required
                    minlength="6"
                    placeholder="Enter new password"
                  >
                  <i
                    class="toggle-eye"
                    [class.ri-eye-line]="showNewPassword"
                    [class.ri-eye-off-line]="!showNewPassword"
                    (click)="showNewPassword = !showNewPassword"
                  ></i>
                </div>
                <p class="info-text" *ngIf="newPassword && newPassword.length < 6">
                  <i class="ri-error-warning-line"></i> Minimum 6 characters required
                </p>
              </div>

              <!-- Confirm Password -->
              <div class="form-group mb-5">
                <label class="form-label">Confirm New Password</label>
                <div class="input-wrapper" [class.error-state]="confirmPassword && confirmPassword !== newPassword">
                  <i class="ri-lock-2-line field-icon"></i>
                  <input
                    [type]="showConfirmPassword ? 'text' : 'password'"
                    name="confirmPassword"
                    class="form-field"
                    [(ngModel)]="confirmPassword"
                    required
                    placeholder="Re-enter new password"
                  >
                  <i
                    class="toggle-eye"
                    [class.ri-eye-line]="showConfirmPassword"
                    [class.ri-eye-off-line]="!showConfirmPassword"
                    (click)="showConfirmPassword = !showConfirmPassword"
                  ></i>
                </div>
                <p class="error-text" *ngIf="confirmPassword && confirmPassword !== newPassword">
                  <i class="ri-close-circle-line"></i> Passwords do not match
                </p>
                <p class="success-text" *ngIf="confirmPassword && confirmPassword === newPassword && newPassword.length >= 6">
                  <i class="ri-check-line"></i> Passwords match
                </p>
              </div>

              <!-- UPDATE BUTTON -->
              <button
                type="submit"
                class="save-btn"
                [disabled]="passwordForm.invalid || newPassword !== confirmPassword || newPassword.length < 6"
              >
                <i class="ri-shield-check-line me-2"></i> Update Password
              </button>

            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
