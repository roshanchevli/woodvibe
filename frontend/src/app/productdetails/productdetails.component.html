<div class="product-details" *ngIf="product">
  <div class="container">
    <div class="row g-5 align-items-start">
      <!-- Left: Product Image Section -->
      <div class="col-lg-6">
        <div class="product-gallery-section" data-aos="fade-right">
          <!-- Main Image -->
          <div class="main-image-wrapper mb-4">
            <img
              [src]="
                mainImage
                  ? 'http://localhost:3000/uploads/' + mainImage
                  : '/images/placeholder.png'
              "
              class="product-img shadow-lg"
              alt="{{ product.pname }}"
            />
          </div>

          <!-- Thumbnails -->
          <div class="thumbnail-gallery d-flex gap-3 overflow-auto pb-2" *ngIf="productImages.length > 1">
            <div 
              class="thumbnail-item" 
              *ngFor="let photo of productImages" 
              (click)="changeMainImage(photo)"
              [class.active]="mainImage === photo"
            >
              <img 
                [src]="'http://localhost:3000/uploads/' + photo" 
                class="img-fluid rounded border border-2 pointer" 
                [ngClass]="mainImage === photo ? 'border-premium shadow-sm' : 'border-transparent'" 
              />
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Product Info Section -->
      <div class="col-lg-6">
        <div class="product-info-section" data-aos="fade-left">
          <span class="category-badge">{{ product.category }}</span>
          <h2>{{ product.pname }}</h2>

          <div class="price">
            <span class="currency-symbol">₹</span>
            <span>{{ product.price | number }}</span>
          </div>

          <p class="desc">
            {{ product.pdesc }}
          </p>

          <div class="actions">
            <button class="buy-btn" (click)="addToCart(product)">
              Add to Cart
            </button>
            <button class="wishlist-btn" [class.wishlisted]="isWishlisted" (click)="addWishlist(product)">
              <i [class.ri-heart-fill]="isWishlisted" [class.ri-heart-line]="!isWishlisted"></i>
            </button>
          </div>

          <!-- Features List -->
          <div class="features-list">
            <div class="feature-item">
              <i class="ri-truck-line"></i>
              <span>Free delivery on orders above ₹5,000</span>
            </div>
            <div class="feature-item">
              <i class="ri-shield-check-line"></i>
              <span>2 Year Woodvibe Warranty</span>
            </div>
            <div class="feature-item">
              <i class="ri-refresh-line"></i>
              <span>30-Day easy return policy</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Loading State (Optional) -->
<div *ngIf="!product" class="container py-5 text-center">
  <div class="spinner-border text-success" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="mt-3 text-muted">Carving your product details...</p>
</div>
