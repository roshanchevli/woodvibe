<div class="product-details" *ngIf="product">

  <div class="container">

    <div class="row">

      <div class="col-md-6">

        <img
          [src]="'http://localhost:3000/uploads/' + product.photo"
          class="product-img"
        />

      </div>

      <div class="col-md-6">

        <h2>{{ product.pname }}</h2>

        <h4 class="price">₹ {{ product.price }}</h4>

        <p class="desc">
          {{ product.pdesc }}
        </p>

        <p>
          <strong>Category:</strong> {{ product.category }}
        </p>

        <button class="buy-btn">
          Add to Cart
        </button>

      </div>

    </div>

  </div>

</div>
