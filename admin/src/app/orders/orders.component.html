<div class="orders-page" data-aos="fade-in">

  <div class="orders-card">
    <div class="card-header">
      <h2><i class="ri-file-list-3-line"></i> All Orders</h2>
    </div>

    <div class="table-wrapper">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Sr No</th>
            <th>Name</th>
            <th>Email</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let o of orders; let i = index">
            <td><span class="id-badge">{{ i + 1 }}</span></td>
            <td class="name-text">{{o.fname}} {{o.lname}}</td>
            <td class="email-text">{{o.email}}</td>
            <td class="product-text">{{o.pname}}</td>
            <td>{{o.qty}}</td>
            <td class="price-text">₹{{o.price * o.qty}}</td>
            <td class="date-text">{{o.createdAt | date:'MMM d, yyyy'}}</td>
            <td>
              <button 
                class="view-btn" 
                [routerLink]="['/orderdetails', o._id]">
                <i class="ri-eye-line"></i> View
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
