<div class="login-wrapper">

  <div class="auth-container">
    
    <!-- Form Section (Now on the Left in Desktop via CSS flex-direction: row-reverse) -->
    <div class="form-section">
      <div class="form-content">
        <div class="form-header">
          <h2>Admin Login</h2>
          <p>Secure authentication for management personnel</p>
        </div>

        <div class="form-body">
          <!-- ERROR ALERT -->
          <div class="error-msg" *ngIf="errorMessage">
            <i class="ri-error-warning-line"></i>
            <span>{{ errorMessage }}</span>
          </div>

          <!-- LOGIN FORM -->
          <form (ngSubmit)="login()">
            
            <!-- EMAIL SECTION -->
            <div class="form-group">
              <label>Email Address</label>
              <div class="input-container">
                <i class="ri-mail-line icon"></i>
                <input
                  type="email"
                  [(ngModel)]="email"
                  name="email"
                  required
                  placeholder="admin@woodvibe.com"
                  (keyup.enter)="login()">
              </div>
            </div>

            <!-- PASSWORD SECTION -->
            <div class="form-group">
              <label>Password</label>
              <div class="input-container">
                <i class="ri-lock-2-line icon"></i>
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  [(ngModel)]="password"
                  name="password"
                  required
                  placeholder="••••••••"
                  (keyup.enter)="login()">
                
                <button
                  type="button"
                  class="visibility-btn"
                  (click)="showPassword = !showPassword">
                  <i [ngClass]="showPassword ? 'ri-eye-off-line' : 'ri-eye-line'"></i>
                </button>
              </div>
            </div>

            <!-- SUBMIT BUTTON -->
            <button type="submit" class="submit-btn" [disabled]="isLoading">
              <span *ngIf="!isLoading">
                Authorize Access <i class="ri-shield-keyhole-line"></i>
              </span>
              <div class="loading-dots" *ngIf="isLoading">
                <span></span><span></span><span></span>
              </div>
            </button>

          </form>
        </div>
      </div>
    </div>

    <!-- Image Section (Now on the Right) -->
    <div class="info-section">
      <img src="images/office1.webp" alt="WoodVibe Admin">
      <div class="overlay-content">
        <h1>Workspace Console</h1>
        <p>Curating the finest woodwork. Managed by craftsmanship.</p>
      </div>
    </div>

  </div>

</div>
