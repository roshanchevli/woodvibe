<div class="product-container">
  <div class="product-card" data-aos="fade-up">
    <!-- Header -->
    <div class="card-header">
      <h4 class="title"><i class="ri-box-3-line"></i> Product List</h4>

      <div class="search-box">
        <i class="ri-search-line search-icon"></i>
        <input
          type="text"
          class="search-input"
          placeholder="Search product..."
          [(ngModel)]="searchText"
          (input)="search()"
        />
      </div>
    </div>

    <div class="table-wrapper">
      <table class="product-table">
        <thead>
          <tr>
            <th>Sr. No</th>
            <th>Name</th>
            <th>Category</th>
            <th>Photo</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Date</th>
            <th width="260">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let p of filteredProducts; let i = index" [attr.data-aos]="'fade-up'" [attr.data-aos-delay]="i * 50">
            <td><span class="id-badge">{{ i + 1 }}</span></td>
            
            <td>
              <span *ngIf="editId !== p._id" class="name-text">{{ p.pname }}</span>
              <input *ngIf="editId === p._id" [(ngModel)]="p.pname" class="edit-input" />
            </td>

            <td>
              <!-- Normal Mode -->
              <span *ngIf="editId !== p._id" class="category-badge">{{ p.category }}</span>

              <!-- Edit Mode -->
              <select *ngIf="editId === p._id" [(ngModel)]="p.category" class="edit-input">
                <option *ngFor="let c of categories" [value]="c.categoryName">
                  {{ c.categoryName }}
                </option>
              </select>
            </td>

            <td class="image-cell">
              <!-- Normal Mode -->
              <div *ngIf="editId !== p._id" class="d-flex gap-1 flex-wrap">
                <ng-container *ngIf="p.photos && p.photos.length > 0; else singlePhoto">
                  <img
                    *ngFor="let img of p.photos"
                    [src]="'http://localhost:3000/uploads/' + img"
                    class="product-img"
                    style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;"
                  />
                </ng-container>
                <ng-template #singlePhoto>
                  <img
                    *ngIf="p.photo"
                    [src]="'http://localhost:3000/uploads/' + p.photo"
                    class="product-img"
                    style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;"
                  />
                </ng-template>
              </div>

              <!-- Edit Mode: Show current photos first -->
              <div *ngIf="editId === p._id" class="edit-img-wrapper">
                <div class="d-flex gap-1 flex-wrap mb-2 justify-content-center">
                  <ng-container *ngIf="p.photos && p.photos.length > 0; else editSinglePhoto">
                    <img
                      *ngFor="let img of p.photos"
                      [src]="'http://localhost:3000/uploads/' + img"
                      class="product-img"
                      style="width: 35px; height: 35px; border-radius: 4px;"
                    />
                  </ng-container>
                  <ng-template #editSinglePhoto>
                    <img
                      *ngIf="p.photo"
                      [src]="'http://localhost:3000/uploads/' + p.photo"
                      class="product-img"
                      style="width: 35px; height: 35px; border-radius: 4px;"
                    />
                  </ng-template>
                </div>
                <div class="file-upload-small">
                  <i class="ri-upload-cloud-2-line"></i>
                  <input type="file" multiple (change)="onFile($event)" />
                </div>
                
                <!-- NEW PREVIEW GRID -->
                <div *ngIf="editPreviews.length > 0" class="mini-preview-grid mt-2">
                  <div *ngFor="let preview of editPreviews; let first = first" class="mini-preview-item">
                    <img [src]="preview" class="mini-img" />
                    <span class="new-tag">New</span>
                  </div>
                </div>

                <div *ngIf="selectedFiles && selectedFiles.length > 0" class="text-primary mt-1" style="font-size: 0.75rem;">
                  Adding +{{ selectedFiles.length }} image(s)
                </div>
                <div class="text-muted mt-1" style="font-size: 0.65rem;">
                  Max 5 total allowed.
                </div>
              </div>
            </td>

            <td>
              <span *ngIf="editId !== p._id" class="price-text">₹{{ p.price }}</span>
              <input
                *ngIf="editId === p._id"
                [(ngModel)]="p.price"
                type="number"
                class="edit-input"
              />
            </td>

            <td>
              <span *ngIf="editId !== p._id">{{ p.qty }} units</span>
              <input
                *ngIf="editId === p._id"
                [(ngModel)]="p.qty"
                type="number"
                class="edit-input"
              />
            </td>

            <td class="date-text">{{ p.date | date:'MMM d, y' }}</td>

            <td class="actions">
              <button *ngIf="editId !== p._id" class="btn edit-btn" (click)="edit(p)">
                <i class="ri-edit-line"></i> Edit
              </button>

              <button *ngIf="editId === p._id" class="btn save-btn" (click)="update(p)">
                <i class="ri-save-line"></i> Save
              </button>

              <button *ngIf="editId === p._id" class="btn cancel-btn" (click)="cancel()">
                <i class="ri-close-line"></i> Cancel
              </button>

              <button class="btn delete-btn" (click)="delete(p._id)">
                <i class="ri-delete-bin-line"></i> Delete
              </button>
            </td>
          </tr>

          <tr *ngIf="filteredProducts.length === 0">
            <td colspan="8" class="no-data">
              <i class="ri-ghost-line"></i>
              No products available
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
